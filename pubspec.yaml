publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path: ^1.9.0
  http: ^1.1.0
  image_picker: ^1.0.7
  video_player: ^2.8.1
  camera: ^0.10.5+5
  path_provider: ^2.1.2
  connectivity_plus: ^5.0.1
  permission_handler: ^11.1.0
  uuid: ^4.2.2
  shared_preferences: ^2.2.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true